<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль - TimeTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen font-sans">

    <header class="bg-white border-b border-slate-200 shadow-sm">
        <div class="container mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600 mb-4 sm:mb-0 tracking-tight">TimeTracker</h1>
            <nav>
                <ul class="flex flex-wrap justify-center space-x-4 sm:space-x-6 text-sm font-medium">
                    <li><a href="index.html" class="text-slate-500 hover:text-blue-600 transition">Таймер</a></li>
                    <li><a href="profile.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Профіль</a></li>
                    <li><a href="about.html" class="text-slate-500 hover:text-blue-600 transition">Про додаток</a></li>
                    <li><a href="login.html" class="text-slate-500 hover:text-blue-600 transition">Вихід</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-10 flex justify-center items-start pt-16">
        <div id="profileCard" class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 w-full max-w-2xl hidden">
            <div class="flex items-center space-x-5 mb-8 pb-6 border-b border-slate-100">
                <div id="userInitial" class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-2xl font-bold text-blue-600">
                    U
                </div>
                <div>
                    <h2 id="profileNameHeader" class="text-2xl font-bold text-slate-800">Ім'я Користувача</h2>
                    <p class="text-slate-500 text-sm font-medium">Співробітник компанії</p>
                </div>
            </div>
            
            <div class="overflow-x-auto rounded-lg border border-slate-200">
                <table class="w-full text-left border-collapse bg-white">
                    <tbody>
                        <tr class="border-b border-slate-200 hover:bg-slate-50 transition">
                            <th class="py-4 px-5 font-semibold text-slate-600 w-1/3 bg-slate-50">Ім'я</th>
                            <td id="tdName" class="py-4 px-5 text-slate-800">-</td>
                        </tr>
                        <tr class="border-b border-slate-200 hover:bg-slate-50 transition">
                            <th class="py-4 px-5 font-semibold text-slate-600 bg-slate-50">Email</th>
                            <td id="tdEmail" class="py-4 px-5 text-slate-800">-</td>
                        </tr>
                        <tr class="border-b border-slate-200 hover:bg-slate-50 transition">
                            <th class="py-4 px-5 font-semibold text-slate-600 bg-slate-50">Стать</th>
                            <td id="tdGender" class="py-4 px-5 text-slate-800">-</td>
                        </tr>
                        <tr class="hover:bg-slate-50 transition">
                            <th class="py-4 px-5 font-semibold text-slate-600 bg-slate-50">Дата народження</th>
                            <td id="tdBirthday" class="py-4 px-5 text-slate-800">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-8 flex justify-end">
                <button id="logoutBtn" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-lg text-sm font-medium transition">
                    Вийти з акаунту
                </button>
            </div>
        </div>

        <div id="noUserMsg" class="text-center py-20 hidden">
            <p class="text-slate-500 mb-4">Ви не авторизовані.</p>
            <a href="login.html" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium">Увійти</a>
        </div>
    </main>

    <footer class="bg-white text-slate-500 py-6 mt-auto border-t border-slate-200">
        <div class="container mx-auto px-4 text-center text-sm">
            <p>&copy; 2026 TimeTracker.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));

            if (!currentUser) {
                document.getElementById('noUserMsg').classList.remove('hidden');
                return;
            }

            // Показуємо картку профілю
            document.getElementById('profileCard').classList.remove('hidden');

            // Заповнюємо дані
            document.getElementById('profileNameHeader').textContent = currentUser.name;
            document.getElementById('tdName').textContent = currentUser.name;
            document.getElementById('tdEmail').textContent = currentUser.email;
            document.getElementById('tdGender').textContent = currentUser.gender;
            document.getElementById('tdBirthday').textContent = currentUser.birthday;
            
            // Встановлюємо першу літеру імені в аватар
            document.getElementById('userInitial').textContent = currentUser.name.charAt(0).toUpperCase();

            // Кнопка виходу
            document.getElementById('logoutBtn').addEventListener('click', function() {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
